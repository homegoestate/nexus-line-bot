name: MOI Real Estate Data Auto Updater

on:
  schedule:
    - cron: '0 20 1,11,21 * *' 
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install axios adm-zip csv-parser iconv-lite ws @supabase/supabase-js
        
      - name: Run MOI Updater Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node scripts/moi_updater.js
