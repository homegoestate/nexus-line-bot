name: Monthly Real Estate Data Sync

on:
  schedule:
    - cron: '0 2 15 * *'
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 下載專案程式碼
        uses: actions/checkout@v4  # 💡 這裡升級成 v4

      - name: ⚙️ 安裝 Node.js 環境
        uses: actions/setup-node@v4 # 💡 這裡升級成 v4
        with:
          node-version: '18'

      - name: 📦 安裝爬蟲套件
        run: npm install

      - name: 🚀 啟動爬蟲程式 (寫入 Supabase)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: npm run sync
