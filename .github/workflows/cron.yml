name: Monthly Real Estate Data Sync

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:      # 💡 確保這行前面只有 2 個空格

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下載專案程式碼
        uses: actions/checkout@v3

      - name: 🛠️ 安裝 Node.js 環境
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 安裝爬蟲套件
        run: npm install

      - name: 🚀 啟動「時光機」補齊歷史資料
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: npm run history
